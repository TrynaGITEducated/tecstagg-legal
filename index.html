<!doctype html>
<html lang="en">
  <head>

    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        margin: 0 auto;
        padding: 2rem;
        background: #0a0a12;
        color: #ffffff;

      .logo {
        width: 80px;
        height: 80px;

        padding: 0.5rem 1rem;
        border-radius: 8px;
        transition: background 0.2s;
      }
      .links a:hover {
        background: rgba(255, 45, 149, 0.1);

      .back-link {
